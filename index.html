<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elaina.one</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f7f7f7;
        }

        .iframe-container {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .iframe-container iframe {
            width: 100%;
            height: 100%;
            border: none;
            position: absolute;
            top: 0;
            left: 0;
        }

        /* 修正后的CSS规则 */
        body div.flex.items-center.justify-between.pb-2.space-x-3,
        body div.flex.flex-col.justify-center.items-center.py-10.pb-24 {
            display: none !important;
        }
    </style>
</head>
</head>
<body>
    <div class="iframe-container">
        <iframe src="https://flowus.cn/wytx/8a50fed9-e339-47c5-9c41-94eb606bd67e" 
                title="FlowUs 息流嵌入" 
                allowfullscreen>
        </iframe>
    </div>
</body>
</html>
