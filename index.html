<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>嵌入网页示例</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f7f7f7;
        }

        .iframe-container {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .iframe-container iframe {
            width: 100%;
            height: 100%;
            border: none;
            position: absolute;
            top: 0;
            left: 0;
        }

        /* 假设我们给iframe添加了一个类名，以便我们可以更精确地定位 */
        .iframe-container iframe {
            display: none; /* 初始时不显示iframe，等待脚本运行 */
        }

        /* 以下CSS规则将被添加到iframe加载的页面中 */
        .flex.items-center.justify-between.pb-2.space-x-3,
        .bg-white1.text-t2,
        .flex.flex-col.justify-center.items-center.py-10.pb-24 {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="iframe-container">
        <iframe src="https://flowus.cn/wytx/8a50fed9-e339-47c5-9c41-94eb606bd67e" 
                title="FlowUs 息流嵌入" 
                allowfullscreen>
        </iframe>
    </div>

    <!-- JavaScript代码用于将CSS规则注入到iframe中 -->
    <script>
        // 等待页面加载完成
        window.addEventListener('load', function() {
            var iframe = document.querySelector('.iframe-container iframe');
            // 确保iframe已经加载
            iframe.addEventListener('load', function() {
                // 创建一个style元素并添加CSS规则
                var style = document.createElement('style');
                style.innerHTML = `
                    .flex.items-center.justify-between.pb-2.space-x-3,
                    .bg-white1.text-t2,
                    .flex.flex-col.justify-center.items-center.py-10.pb-24 {
                        display: none !important;
                    }
                `;
                // 将style元素添加到iframe的文档头部
                iframe.contentDocument.head.appendChild(style);
                // 显示iframe
                iframe.style.display = 'block';
            });
        });
    </script>
</body>
</html>
