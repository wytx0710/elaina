<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <!-- 确保viewport元信息正确设置以支持响应式设计 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elaina——The Ashen Witch</title>
    <!-- 内联CSS样式 -->
    <style>
        /* 基本的CSS重置，确保不同浏览器的一致性 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box; /* 边框盒模型 */
        }

        /* 确保body元素适应屏幕宽度 */
        body {
            width: 100%;
            min-height: 100vh; /* 使用视口高度 */
            overflow-x: hidden; /* 防止内容过宽时横向滚动 */
        }

        /* 设置object和iframe元素的样式 */
        object, iframe {
            width: 100%; /* 宽度自适应 */
            height: auto; /* 高度自适应 */
            border: none; /* 移除边框 */
        }

        /* 可以添加其他样式来进一步控制布局和响应式设计 */
    </style>
</head>
<body>
    <!-- 网页内容 -->

    <!-- 您的object和iframe元素 -->
    <object data="https://www.baidu.com" type="text/html" width="100%" height="100"></object>
    <iframe src="https://flowus.cn/wytx/8a50fed9-e339-47c5-9c41-94eb606bd67e" width="100%" height="500"></iframe>
</body>
</html>
