<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elaina——The Ashen Witch</title>
    <style>
        /* 确保整个页面的高度为视口的100% */
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; /* 可选，防止内容溢出 */
        }
        /* 设置iframe的宽度和高度为100%，使其自适应屏幕 */
        .responsive-iframe {
            position: absolute; /* 绝对定位，使其充满整个视口 */
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            border: 0; /* 移除边框 */
        }
    </style>
</head>
<body>
    <!-- 将iframe包裹在一个div中，以便使用CSS样式 -->
    <div class="responsive-iframe">
        <iframe src="https://flowus.cn/wytx/8a50fed9-e339-47c5-9c41-94eb606bd67e" allowfullscreen></iframe>
    </div>
</body>
</html>
